# IN-MEMORY DATABASE FOR EASY RUNNING
spring.datasource.url=jdbc:h2:mem:foundit_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
server.port=${PORT:8081}

# Keep your tables building automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

# Gemini AI API Key
gemini.api.key=${GEMINI_API_KEY:}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:mock-client-id}
# Use your REAL Google Secret here so login works on your laptop
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:mock-client-secret}
spring.security.oauth2.client.registration.google.scope=profile, email

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:dummy@gmail.com}
spring.mail.password=${MAIL_PASSWORD:dummy}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true